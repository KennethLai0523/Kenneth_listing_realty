<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EMHub Bukit Raja | Commercial Hub in Klang | Kenneth Lai</title>
  <meta name="description" content="Explore EMHub Bukit Raja, a premium commercial hub in Klang with flexible built-up sizes for office, showroom, warehouse and business use.">

  <link rel="canonical" href="https://kennethlai.site/emhub.html">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (for WhatsApp, Facebook) -->
  <meta property="og:url" content="https://kennethlai.site/emhub.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="EMHub Bukit Raja | Commercial Hub in Klang">
  <meta property="og:description" content="Premium commercial hub concept in Bukit Raja, Klang. Suitable for showroom, office, warehouse and business use.">
  <meta property="og:image" content="https://kennethlai.site/images/emhub-bukit-raja-hero.jpg">

  <!-- Twitter (also used by some platforms) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="EMHub Bukit Raja | Commercial Hub in Klang">
  <meta name="twitter:description" content="Premium commercial hub concept in Bukit Raja, Klang. Suitable for showroom, office, warehouse and business use.">
  <meta name="twitter:image" content="https://kennethlai.site/images/emhub-bukit-raja-hero.jpg">

  <meta name="theme-color" content="#6db7ff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f9ff;
      --bg-2:#eef5ff;
      --panel:#ffffff;
      --panel-soft:rgba(255,255,255,0.72);
      --text:#152033;
      --muted:#5f6f87;
      --line:rgba(21,32,51,0.10);
      --line-strong:rgba(21,32,51,0.16);
      --primary:#6db7ff;
      --primary-2:#3b82f6;
      --primary-3:#dff0ff;
      --dark:#0f1f3a;
      --success:#21b26f;
      --shadow:0 18px 50px rgba(28,54,90,0.10);
      --shadow-lg:0 28px 80px rgba(36,63,112,0.14);
      --radius-xl:30px;
      --radius-lg:22px;
      --radius-md:16px;
      --max:1240px;
    }

    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      margin:0;
      font-family:'Inter',sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(109,183,255,0.20), transparent 26%),
        radial-gradient(circle at right top, rgba(59,130,246,0.10), transparent 22%),
        linear-gradient(180deg,#f8fbff 0%,#f2f7ff 45%,#eef5ff 100%);
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
      background-size:46px 46px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0));
    }

    img{max-width:100%;display:block;}
    a{text-decoration:none;color:inherit;}
    .container{width:min(calc(100% - 32px), var(--max));margin:0 auto;position:relative;z-index:1;}
    .section{padding:96px 0;}

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(18px);
      background:rgba(248,251,255,0.76);
      border-bottom:1px solid rgba(21,32,51,0.08);
    }
    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }
    .brand-mark{
      width:54px;
      height:54px;
      border-radius:18px;
      background:linear-gradient(135deg, #90cdfc, #3b82f6);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      letter-spacing:0.08em;
      box-shadow:0 14px 34px rgba(59,130,246,0.24);
    }
    .brand-text strong{
      display:block;
      font-size:0.98rem;
      letter-spacing:0.08em;
      text-transform:uppercase;
      font-family:'Manrope',sans-serif;
    }
    .brand-text span{
      color:var(--muted);
      font-size:0.84rem;
    }
    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      flex-wrap:wrap;
    }
    .nav-links a{
      font-size:0.95rem;
      color:#33445f;
      transition:0.22s ease;
    }
    .nav-links a:hover{color:var(--primary-2);}

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      border:0;
      border-radius:999px;
      padding:14px 22px;
      font-weight:700;
      cursor:pointer;
      transition:0.22s ease;
    }
    .btn:hover{transform:translateY(-2px);}
    .btn-primary{
      background:linear-gradient(135deg,#6db7ff,#3b82f6);
      color:#fff;
      box-shadow:0 14px 34px rgba(59,130,246,0.24);
    }
    .btn-secondary{
      background:rgba(255,255,255,0.72);
      border:1px solid rgba(21,32,51,0.10);
      color:var(--dark);
      box-shadow:var(--shadow);
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:var(--primary-2);
      font-size:0.82rem;
      font-weight:800;
      letter-spacing:0.22em;
      text-transform:uppercase;
      margin-bottom:18px;
    }
    .eyebrow::before{
      content:"";
      width:44px;
      height:2px;
      background:linear-gradient(90deg, var(--primary-2), transparent);
      border-radius:999px;
    }
    .section-title{
      font-family:'Manrope',sans-serif;
      font-size:clamp(2.2rem,4vw,4rem);
      line-height:1.02;
      letter-spacing:-0.04em;
      margin:0;
    }
    .section-title .accent{color:var(--primary-2);}
    .section-copy{
      margin-top:18px;
      max-width:780px;
      color:var(--muted);
      line-height:1.75;
      font-size:1.02rem;
    }

    .hero{padding:42px 0 82px;}
    .hero-grid{
      display:grid;
      grid-template-columns:1.06fr 0.94fr;
      gap:26px;
      align-items:stretch;
    }
    .hero-copy,
    .hero-visual{
      border-radius:var(--radius-xl);
      position:relative;
      overflow:hidden;
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow-lg);
    }
    .hero-copy{
      background:linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.76));
      backdrop-filter:blur(18px);
      padding:58px;
      min-height:760px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    .hero-badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:fit-content;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(109,183,255,0.12);
      color:var(--primary-2);
      border:1px solid rgba(59,130,246,0.16);
      font-weight:700;
      font-size:0.88rem;
      margin-bottom:22px;
    }
    .hero h1{
      font-family:'Manrope',sans-serif;
      font-size:clamp(3rem,5.8vw,6rem);
      line-height:0.96;
      letter-spacing:-0.06em;
      margin:0;
      max-width:720px;
    }
    .hero h1 .light{
      display:block;
      color:var(--primary-2);
    }
    .hero p{
      margin:24px 0 0;
      max-width:650px;
      color:var(--muted);
      line-height:1.8;
      font-size:1.05rem;
    }
    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-top:32px;
    }
    .hero-metrics{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin-top:34px;
    }
    .metric{
      padding:18px;
      border-radius:20px;
      background:rgba(255,255,255,0.72);
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow);
    }
    .metric strong{
      display:block;
      font-size:1.32rem;
      color:var(--dark);
      margin-bottom:6px;
    }
    .metric span{
      color:var(--muted);
      font-size:0.9rem;
      line-height:1.55;
    }

    .hero-visual{
      min-height:760px;
      background:
        linear-gradient(180deg, rgba(18,34,63,0.02), rgba(18,34,63,0.48)),
        url('images/emhub-bukit-raja-hero.jpg') center/cover no-repeat;
    }
    .hero-visual::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(109,183,255,0.08), transparent 32%, rgba(15,31,58,0.38));
    }
    .floating-card{
      position:absolute;
      right:24px;
      bottom:24px;
      left:24px;
      z-index:2;
      display:grid;
      grid-template-columns:1fr auto;
      gap:18px;
      align-items:center;
      padding:24px;
      border-radius:24px;
      background:rgba(255,255,255,0.76);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.56);
      box-shadow:var(--shadow);
    }
    .floating-card h3{
      margin:0;
      font-size:1.26rem;
      font-family:'Manrope',sans-serif;
      color:var(--dark);
    }
    .floating-card p{
      margin:8px 0 0;
      font-size:0.94rem;
      color:var(--muted);
      line-height:1.6;
    }
    .price-box{text-align:right;}
    .price-box strong{
      display:block;
      font-size:2rem;
      color:var(--dark);
      font-family:'Manrope',sans-serif;
    }
    .price-box span{
      display:block;
      color:var(--primary-2);
      text-transform:uppercase;
      letter-spacing:0.18em;
      font-size:0.76rem;
      font-weight:800;
      margin-bottom:6px;
    }

    .info-band{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
      margin-top:32px;
    }
    .info-box{
      background:rgba(255,255,255,0.78);
      border:1px solid rgba(21,32,51,0.08);
      border-radius:22px;
      padding:24px;
      box-shadow:var(--shadow);
    }
    .info-box strong{
      display:block;
      font-family:'Manrope',sans-serif;
      font-size:1.7rem;
      color:var(--dark);
      margin-bottom:6px;
    }
    .info-box span{color:var(--muted);line-height:1.6;}

    .panel-grid{
      display:grid;
      grid-template-columns:0.96fr 1.04fr;
      gap:24px;
      align-items:stretch;
    }
    .panel{
      background:rgba(255,255,255,0.78);
      border:1px solid rgba(21,32,51,0.08);
      border-radius:var(--radius-xl);
      padding:34px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }
    .story-list{display:grid;gap:16px;margin-top:24px;}
    .story-item{
      padding:18px 18px 18px 20px;
      border-left:3px solid var(--primary-2);
      background:linear-gradient(180deg,#ffffff,#f7fbff);
      border-radius:16px;
      box-shadow:0 10px 26px rgba(36,63,112,0.06);
    }
    .story-item strong{
      display:block;
      margin-bottom:7px;
      color:var(--dark);
      font-size:1.02rem;
    }
    .story-item span{
      color:var(--muted);
      line-height:1.7;
      font-size:0.94rem;
    }

    .highlight-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      margin-top:34px;
    }
    .highlight-card{
      background:rgba(255,255,255,0.80);
      border:1px solid rgba(21,32,51,0.08);
      border-radius:26px;
      padding:26px;
      box-shadow:var(--shadow);
      transition:0.22s ease;
      min-height:240px;
    }
    .highlight-card:hover{
      transform:translateY(-6px);
      box-shadow:0 22px 50px rgba(59,130,246,0.16);
      border-color:rgba(59,130,246,0.18);
    }
    .icon{
      width:58px;
      height:58px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg, rgba(109,183,255,0.18), rgba(59,130,246,0.10));
      color:var(--primary-2);
      font-size:1.35rem;
      border:1px solid rgba(59,130,246,0.14);
      margin-bottom:18px;
    }
    .highlight-card h3{
      margin:0 0 10px;
      font-size:1.12rem;
      font-family:'Manrope',sans-serif;
      color:var(--dark);
    }
    .highlight-card p{
      margin:0;
      color:var(--muted);
      line-height:1.72;
      font-size:0.95rem;
    }

    .usage-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:18px;
      margin-top:34px;
    }
    .usage-card{
      position:relative;
      min-height:430px;
      overflow:hidden;
      border-radius:28px;
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow-lg);
      background:#dcecff;
    }
    .usage-bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      transform:scale(1.02);
    }
    .usage-bg::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.08), rgba(15,31,58,0.68));
    }
    .usage-content{
      position:absolute;
      inset:auto 0 0 0;
      z-index:1;
      padding:24px;
    }
    .tag{
      display:inline-flex;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.24);
      color:#fff;
      font-size:0.76rem;
      font-weight:800;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:14px;
    }
    .usage-content h3{
      margin:0 0 10px;
      color:#fff;
      font-size:1.42rem;
      font-family:'Manrope',sans-serif;
    }
    .usage-content ul{
      margin:0;
      padding-left:18px;
      color:#edf4ff;
      line-height:1.75;
      font-size:0.94rem;
    }

    .gallery-shell{
      display:grid;
      grid-template-columns:1.15fr 0.85fr;
      gap:20px;
      margin-top:36px;
    }
    .gallery-main,
    .gallery-side{
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow-lg);
    }
    .gallery-main{
      min-height:640px;
      position:relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(15,31,58,0.38)),
        url('images/emhub-bukit-raja-gallery-1.jpg') center/cover no-repeat;
    }
    .gallery-main .overlay{
      position:absolute;
      left:26px;
      right:26px;
      bottom:26px;
      background:rgba(255,255,255,0.78);
      border:1px solid rgba(255,255,255,0.55);
      backdrop-filter:blur(18px);
      border-radius:24px;
      padding:22px;
      box-shadow:var(--shadow);
    }
    .gallery-main .overlay strong{
      display:block;
      font-size:1.22rem;
      font-family:'Manrope',sans-serif;
      color:var(--dark);
    }
    .gallery-main .overlay span{
      display:block;
      margin-top:8px;
      line-height:1.65;
      color:var(--muted);
    }
    .gallery-side{
      display:grid;
      gap:1px;
      background:rgba(21,32,51,0.08);
    }
    .mini{
      position:relative;
      min-height:213px;
      background-size:cover;
      background-position:center;
    }
    .mini::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(15,31,58,0.40));
    }
    .mini::after{
      content:attr(data-label);
      position:absolute;
      left:18px;
      bottom:18px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.26);
      color:#fff;
      font-size:0.8rem;
      font-weight:800;
      letter-spacing:0.12em;
      text-transform:uppercase;
    }

    .plans-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:20px;
      margin-top:36px;
    }
    .plan-card{
      overflow:hidden;
      border-radius:28px;
      background:rgba(255,255,255,0.84);
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow-lg);
      display:grid;
      grid-template-columns:0.88fr 1.12fr;
    }
    .plan-copy{
      padding:30px;
      background:linear-gradient(180deg,#90cdfc,#5daeff);
      color:#fff;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:12px;
    }
    .plan-copy h3{
      margin:0;
      font-size:2rem;
      font-family:'Manrope',sans-serif;
      line-height:0.98;
    }
    .plan-copy p{
      margin:0;
      color:rgba(255,255,255,0.94);
      line-height:1.68;
    }
    .plan-image{
      min-height:360px;
      background-size:cover;
      background-position:center;
    }

    .location-grid{
      display:grid;
      grid-template-columns:0.9fr 1.1fr;
      gap:22px;
      margin-top:34px;
    }
    .location-card,
    .map-card{
      padding:28px;
      border-radius:28px;
      background:rgba(255,255,255,0.80);
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }
    .adv-list{display:grid;gap:14px;margin-top:18px;}
    .adv{
      padding:18px;
      border-radius:18px;
      background:linear-gradient(180deg,#ffffff,#f7fbff);
      border:1px solid rgba(21,32,51,0.06);
      box-shadow:0 10px 28px rgba(36,63,112,0.06);
    }
    .adv strong{
      display:block;
      margin-bottom:6px;
      color:var(--dark);
      font-family:'Manrope',sans-serif;
    }
    .adv span{color:var(--muted);line-height:1.66;}
    .map-frame{
      min-height:520px;
      position:relative;
      overflow:hidden;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(15,31,58,0.18)),
        url('images/emhub-bukit-raja-map.jpg') center/cover no-repeat;
      border:1px solid rgba(21,32,51,0.08);
    }
    .map-note{
      position:absolute;
      top:18px;
      left:18px;
      max-width:260px;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(255,255,255,0.78);
      border:1px solid rgba(255,255,255,0.56);
      backdrop-filter:blur(18px);
      color:var(--dark);
      line-height:1.6;
      font-size:0.92rem;
      box-shadow:var(--shadow);
    }

    .specs-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      margin-top:34px;
    }
    .spec-card{
      padding:26px;
      border-radius:24px;
      background:rgba(255,255,255,0.84);
      border:1px solid rgba(21,32,51,0.08);
      box-shadow:var(--shadow);
    }
    .spec-card h3{
      margin
