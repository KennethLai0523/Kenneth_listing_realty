<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Armani Bizcore Full Unit Lookup</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #6b6b6b;
      --accent: #b89257;
      --line: #e7dcc8;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8f5ef 0%, #efe7d8 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px 50px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff8ee;
      border: 1px solid var(--line);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.02;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 14px;
      align-items: end;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #4f4f4f;
    }

    select, button {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font: inherit;
    }

    select {
      padding: 0 14px;
      background: #fff;
      color: var(--text);
    }

    button {
      padding: 0 18px;
      background: linear-gradient(135deg, #c7a269, #b89257);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      border: none;
      min-width: 140px;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .result {
      display: none;
      margin-top: 8px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
    }

    .result.show {
      display: block;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .result-title {
      margin: 0;
      font-size: 24px;
    }

    .pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f9f3e8;
      color: #8c6a34;
      font-weight: 700;
      font-size: 13px;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .detail-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fffdfa;
    }

    .detail-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      margin-top: 10px;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .form-grid { grid-template-columns: 1fr; }
      .details { grid-template-columns: 1fr 1fr; }
      button { min-width: 0; }
    }

    @media (max-width: 520px) {
      .details { grid-template-columns: 1fr; }
      .card { padding: 16px; }
    }
  </style>
</head>

        <div class="note">Built from your uploaded Armani BizCore available chart.</div>

      <div id="emptyMessage" class="empty">No unit selected yet.</div>
    </div>
  </div>

    const levelSelect = document.getElementById("levelSelect");
    const unitSelect = document.getElementById("unitSelect");
    const searchBtn = document.getElementById("searchBtn");
    const result = document.getElementById("result");
    const emptyMessage = document.getElementById("emptyMessage");

    const resultTitle = document.getElementById("resultTitle");
    const resultLevel = document.getElementById("resultLevel");
    const typeValue = document.getElementById("typeValue");
    const spaValue = document.getElementById("spaValue");
    const nettValue = document.getElementById("nettValue");
    const facingValue = document.getElementById("facingValue");
    const buaValue = document.getElementById("buaValue");
    const carparkValue = document.getElementById("carparkValue");

    function formatCurrency(value) {
      if (value === undefined || value === null || value === "") return "-";
      return "RM " + Number(value).toLocaleString("en-MY", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    function resetResult(message = "No unit selected yet.") {
      result.classList.remove("show");
      emptyMessage.textContent = message;
    }

    function updateButtonState() {
      searchBtn.disabled = !(levelSelect.value && unitSelect.value);
    }

    function populateLevels() {
      const levels = Object.keys(unitData);
      levels.forEach(level => {
        const option = document.createElement("option");
        option.value = level;
        option.textContent = level;
        levelSelect.appendChild(option);
      });
    }

    function populateUnits(level) {
      unitSelect.innerHTML = '<option value="">Select unit</option>';

      if (!level || !unitData[level]) {
        unitSelect.disabled = true;
        updateButtonState();
        return;
      }

      const units = Object.keys(unitData[level]).sort((a, b) =>
        a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" })
      );

      units.forEach(unit => {
        const option = document.createElement("option");
        option.value = unit;
        option.textContent = unit;
        unitSelect.appendChild(option);
      });

      unitSelect.disabled = false;
      updateButtonState();
    }

    function showSelectedUnit() {
      const selectedLevel = levelSelect.value;
      const selectedUnit = unitSelect.value;

      if (!selectedLevel || !selectedUnit || !unitData[selectedLevel] || !unitData[selectedLevel][selectedUnit]) {
        resetResult("Please select a valid level and unit number.");
        return;
      }

      const item = unitData[selectedLevel][selectedUnit];

      resultTitle.textContent = `Unit ${selectedUnit}`;
      resultLevel.textContent = selectedLevel;
      typeValue.textContent = item.type || "-";
      spaValue.textContent = formatCurrency(item.spa);
      nettValue.textContent = formatCurrency(item.nett);
      facingValue.textContent = item.facing || "-";
      buaValue.textContent = item.bua ? `${Number(item.bua).toLocaleString()} sq.ft` : "-";
      carparkValue.textContent = item.carpark ? `${item.carpark} CP` : "-";

      emptyMessage.textContent = "";
      result.classList.add("show");
    }

    populateLevels();
    updateButtonState();

    levelSelect.addEventListener("change", function () {
      populateUnits(this.value);
      resetResult("Please choose a unit number.");
    });

    unitSelect.addEventListener("change", function () {
      updateButtonState();
      if (this.value) {
        showSelectedUnit();
      } else {
        resetResult("Please choose a unit number.");
      }
    });

    searchBtn.addEventListener("click", showSelectedUnit);
  </script>
