<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Listings</title>

<style>

body{
font-family:Arial;
background:#f4f1eb;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

textarea{
height:100px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.add{background:#2f6fed;color:white;}
.copy{background:#25D366;color:white;}
.delete{background:#d9534f;color:white;}

.code{
width:100%;
height:300px;
font-family:monospace;
}

.item{
border-bottom:1px solid #eee;
padding:10px 0;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Add Listing</h2>

<input id="title" placeholder="Title">
<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<input id="rooms" placeholder="Rooms">
<input id="bathrooms" placeholder="Bathrooms">
<input id="builtup" placeholder="Built-up">
<input id="furnishing" placeholder="Furnishing">
<input id="tenure" placeholder="Tenure">
<input id="whatsapp" placeholder="WhatsApp Number">

<textarea id="description" placeholder="Description"></textarea>

<textarea id="photos" placeholder="Photo URLs (one per line)"></textarea>

<button class="add" onclick="add()">Add Listing</button>

</div>

<div class="card">

<h2>Listings</h2>

<div id="list"></div>

</div>

<div class="card">

<h2>Export listings.js</h2>

<button class="copy" onclick="exportCode()">Generate</button>
<button class="copy" onclick="copy()">Copy</button>

<textarea id="output" class="code"></textarea>

</div>

</div>

<script src="listings.js"></script>

<script>

let items=[...LISTINGS]

function add(){

let photos=document.getElementById("photos").value
.split("\n")
.map(x=>x.trim())
.filter(Boolean)

items.unshift({

id:Date.now(),
title:document.getElementById("title").value,
location:document.getElementById("location").value,
price:document.getElementById("price").value,
rooms:document.getElementById("rooms").value,
bathrooms:document.getElementById("bathrooms").value,
builtup:document.getElementById("builtup").value,
furnishing:document.getElementById("furnishing").value,
tenure:document.getElementById("tenure").value,
description:document.getElementById("description").value,
whatsapp:document.getElementById("whatsapp").value,
photos

})

render()
exportCode()

}

function remove(id){

items=items.filter(x=>x.id!==id)
render()
exportCode()

}

function render(){

let html=""

items.forEach(x=>{

html+=`
<div class="item">

<b>${x.title||"(No title)"}</b><br>
${x.location||""} ${x.price||""}

<br>

<button class="delete"
onclick="remove(${x.id})">
Delete
</button>

</div>
`

})

document.getElementById("list").innerHTML=html

}

function exportCode(){

document.getElementById("output").value=
"const LISTINGS = "+
JSON.stringify(items,null,2)+";"

}

function copy(){

let t=document.getElementById("output")

t.select()
document.execCommand("copy")

alert("Copied")

}

render()
exportCode()

</script>

</body>
</html>
