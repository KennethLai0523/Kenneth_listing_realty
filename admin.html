<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Listings</title>

<style>

body{
font-family:Arial;
background:#f4f1eb;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

textarea{
height:100px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-right:8px;
margin-bottom:8px;
}

.add{background:#2f6fed;color:white;}
.copy{background:#25D366;color:white;}
.delete{background:#d9534f;color:white;}
.edit{background:#f0ad4e;color:white;}
.cancel{background:#6c757d;color:white;}

.code{
width:100%;
height:300px;
font-family:monospace;
}

.item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.status-section{
margin:12px 0 16px 0;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
background:#faf8f4;
}

.status-title{
font-weight:bold;
margin-bottom:10px;
}

.status-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.status-btn{
background:#e9e9e9;
color:#333;
border:1px solid #ccc;
}

.status-btn.active{
color:white;
border:none;
}

.status-available.active{
background:#28a745;
}

.status-not-available.active{
background:#6c757d;
}

.status-sold.active{
background:#d9534f;
}

.status-rented.active{
background:#f0ad4e;
}

.status-badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
margin-top:8px;
}

.badge-available{
background:#28a745;
}

.badge-not-available{
background:#6c757d;
}

.badge-sold{
background:#d9534f;
}

.badge-rented{
background:#f0ad4e;
}

.editing-note{
display:none;
margin-bottom:14px;
padding:10px 14px;
border-radius:8px;
background:#fff3cd;
color:#856404;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2 id="formTitle">Add Listing</h2>

<div id="editingNote" class="editing-note">You are editing an existing listing</div>

<input id="title" placeholder="Title">
<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<input id="rooms" placeholder="Rooms">
<input id="bathrooms" placeholder="Bathrooms">
<input id="builtup" placeholder="Built-up">
<input id="furnishing" placeholder="Furnishing">
<input id="tenure" placeholder="Tenure">
<input id="whatsapp" placeholder="WhatsApp Number">

<textarea id="description" placeholder="Description"></textarea>

<textarea id="photos" placeholder="Photo URLs (one per line)"></textarea>

<textarea id="privateNotes" placeholder="Private Notes (Admin Only - owner contact, remarks, lowest price etc)"></textarea>

<div class="status-section">
  <div class="status-title">Listing Status</div>
  <div class="status-buttons">
    <button type="button" class="status-btn status-available active" onclick="setStatus('Available', this)">Available</button>
    <button type="button" class="status-btn status-not-available" onclick="setStatus('Not Available', this)">Not Available</button>
    <button type="button" class="status-btn status-sold" onclick="setStatus('Sold', this)">Sold</button>
    <button type="button" class="status-btn status-rented" onclick="setStatus('Rented', this)">Rented</button>
  </div>
</div>

<button class="add" id="mainActionBtn" onclick="add()">Add Listing</button>
<button class="cancel" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>

</div>

<div class="card">

<h2>Listings</h2>

<div id="list"></div>

</div>

<div class="card">

<h2>Export listings.js</h2>

<button class="copy" onclick="exportCode()">Generate</button>
<button class="copy" onclick="copy()">Copy</button>

<textarea id="output" class="code"></textarea>

</div>

</div>

<script src="listings.js"></script>

<script>

let items=[...LISTINGS]
let selectedStatus="Available"
let editingId=null

function setStatus(status, el){

selectedStatus=status

document.querySelectorAll(".status-btn").forEach(btn=>{
btn.classList.remove("active")
})

el.classList.add("active")

}

function activateStatusButton(status){
document.querySelectorAll(".status-btn").forEach(btn=>{
btn.classList.remove("active")
})

if(status==="Available"){
document.querySelector(".status-available").classList.add("active")
}
else if(status==="Not Available"){
document.querySelector(".status-not-available").classList.add("active")
}
else if(status==="Sold"){
document.querySelector(".status-sold").classList.add("active")
}
else if(status==="Rented"){
document.querySelector(".status-rented").classList.add("active")
}
}

function getBadgeClass(status){
if(status==="Available") return "badge-available"
if(status==="Not Available") return "badge-not-available"
if(status==="Sold") return "badge-sold"
if(status==="Rented") return "badge-rented"
return "badge-available"
}

function clearForm(){
document.getElementById("title").value=""
document.getElementById("location").value=""
document.getElementById("price").value=""
document.getElementById("rooms").value=""
document.getElementById("bathrooms").value=""
document.getElementById("builtup").value=""
document.getElementById("furnishing").value=""
document.getElementById("tenure").value=""
document.getElementById("whatsapp").value=""
document.getElementById("description").value=""
document.getElementById("photos").value=""
document.getElementById("privateNotes").value=""

selectedStatus="Available"
activateStatusButton("Available")
}

function getFormData(existingId=null){

let photos=document.getElementById("photos").value
.split("\n")
.map(x=>x.trim())
.filter(Boolean)

return {
id: existingId || Date.now(),
title:document.getElementById("title").value,
location:document.getElementById("location").value,
price:document.getElementById("price").value,
rooms:document.getElementById("rooms").value,
bathrooms:document.getElementById("bathrooms").value,
builtup:document.getElementById("builtup").value,
furnishing:document.getElementById("furnishing").value,
tenure:document.getElementById("tenure").value,
description:document.getElementById("description").value,
whatsapp:document.getElementById("whatsapp").value,
photos:photos,
privateNotes:document.getElementById("privateNotes").value,
status:selectedStatus
}

}

function add(){

if(editingId!==null){
updateListing()
return
}

items.unshift(getFormData())
clearForm()
render()
exportCode()

}

function editItem(id){

let item=items.find(x=>x.id===id)
if(!item) return

editingId=id

document.getElementById("formTitle").innerText="Edit Listing"
document.getElementById("editingNote").style.display="block"
document.getElementById("mainActionBtn").innerText="Update Listing"
document.getElementById("cancelEditBtn").style.display="inline-block"

document.getElementById("title").value=item.title || ""
document.getElementById("location").value=item.location || ""
document.getElementById("price").value=item.price || ""
document.getElementById("rooms").value=item.rooms || ""
document.getElementById("bathrooms").value=item.bathrooms || ""
document.getElementById("builtup").value=item.builtup || ""
document.getElementById("furnishing").value=item.furnishing || ""
document.getElementById("tenure").value=item.tenure || ""
document.getElementById("whatsapp").value=item.whatsapp || ""
document.getElementById("description").value=item.description || ""
document.getElementById("photos").value=(item.photos || []).join("\n")
document.getElementById("privateNotes").value=item.privateNotes || ""

selectedStatus=item.status || "Available"
activateStatusButton(selectedStatus)

window.scrollTo({
top:0,
behavior:"smooth"
})

}

function updateListing(){

if(editingId===null) return

items=items.map(x=>{
if(x.id===editingId){
return getFormData(editingId)
}
return x
})

cancelEdit()
render()
exportCode()

}

function cancelEdit(){

editingId=null
document.getElementById("formTitle").innerText="Add Listing"
document.getElementById("editingNote").style.display="none"
document.getElementById("mainActionBtn").innerText="Add Listing"
document.getElementById("cancelEditBtn").style.display="none"
clearForm()

}

function remove(id){

items=items.filter(x=>x.id!==id)

if(editingId===id){
cancelEdit()
}

render()
exportCode()

}

function render(){

let html=""

items.forEach(x=>{

let status=x.status || "Available"

html+=`
<div class="item">

<b>${x.title||"(No title)"}</b><br>
${x.location||""} ${x.price||""}

<br>

<span class="status-badge ${getBadgeClass(status)}">${status}</span>

<br><br>

<button class="edit" onclick="editItem(${x.id})">Edit</button>

<button class="delete" onclick="remove(${x.id})">
Delete
</button>

</div>
`

})

document.getElementById("list").innerHTML=html

}

function exportCode(){

document.getElementById("output").value=
"const LISTINGS = "+
JSON.stringify(items,null,2)+";"

}

function copy(){

let t=document.getElementById("output")
t.select()
document.execCommand("copy")
alert("Copied")

}

render()
exportCode()

</script>

</body>
</html>
