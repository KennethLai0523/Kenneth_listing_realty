<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Listings</title>

<style>

body{
font-family:Arial;
background:#f4f1eb;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
font-family:Arial;
font-size:14px;
}

textarea{
height:100px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
margin-right:8px;
margin-bottom:8px;
}

.add{background:#2f6fed;color:white;}
.copy{background:#25D366;color:white;}
.delete{background:#d9534f;color:white;}
.edit{background:#f0ad4e;color:white;}
.cancel{background:#6c757d;color:white;}

.code{
width:100%;
height:300px;
font-family:monospace;
}

.item{
border-bottom:1px solid #eee;
padding:10px 0;
}

.status-section{
margin:12px 0 16px 0;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
background:#faf8f4;
}

.status-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.status-btn{
background:#e9e9e9;
border:1px solid #ccc;
}

.status-btn.active{
color:white;
border:none;
}

.status-available.active{background:#28a745;}
.status-not-available.active{background:#6c757d;}
.status-sold.active{background:#d9534f;}
.status-rented.active{background:#f0ad4e;}

.status-badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
color:white;
margin-top:8px;
}

.badge-available{background:#28a745;}
.badge-not-available{background:#6c757d;}
.badge-sold{background:#d9534f;}
.badge-rented{background:#f0ad4e;}

.editing-note{
display:none;
margin-bottom:14px;
padding:10px;
background:#fff3cd;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2 id="formTitle">Add Listing</h2>
<div id="editingNote" class="editing-note">Editing Listing</div>

<input id="title" placeholder="Title">
<input id="location" placeholder="Location">
<input id="price" placeholder="Price">
<input id="rooms" placeholder="Rooms">
<input id="bathrooms" placeholder="Bathrooms">
<input id="builtup" placeholder="Built-up">
<input id="furnishing" placeholder="Furnishing">
<input id="tenure" placeholder="Tenure">
<input id="whatsapp" placeholder="WhatsApp Number">

<textarea id="description" placeholder="Description"></textarea>
<textarea id="photos" placeholder="Photo URLs (one per line)"></textarea>
<textarea id="privateNotes" placeholder="Private Notes"></textarea>

<div class="status-section">
<div class="status-buttons">
<button class="status-btn status-available active" onclick="setStatus('Available',this)">Available</button>
<button class="status-btn status-not-available" onclick="setStatus('Not Available',this)">Not Available</button>
<button class="status-btn status-sold" onclick="setStatus('Sold',this)">Sold</button>
<button class="status-btn status-rented" onclick="setStatus('Rented',this)">Rented</button>
</div>
</div>

<button class="add" id="mainBtn" onclick="add()">Add Listing</button>
<button class="cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none;">Cancel</button>

</div>

<div class="card">
<h2>Listings</h2>
<div id="list"></div>
</div>

<div class="card">
<h2>Export listings.js</h2>
<button class="copy" onclick="exportCode()">Generate</button>
<button class="copy" onclick="copy()">Copy</button>
<textarea id="output" class="code"></textarea>
</div>

</div>

<script src="listings.js"></script>

<script>

let items=[...LISTINGS]
let selectedStatus="Available"
let editingId=null

function setStatus(status,el){
selectedStatus=status
document.querySelectorAll(".status-btn").forEach(b=>b.classList.remove("active"))
el.classList.add("active")
}

function getBadge(status){
if(status==="Available") return "badge-available"
if(status==="Not Available") return "badge-not-available"
if(status==="Sold") return "badge-sold"
if(status==="Rented") return "badge-rented"
return "badge-available"
}

function getData(id=null){
let photos=photosInput().split("\n").map(x=>x.trim()).filter(Boolean)

return{
id:id||Date.now(),
title:title.value,
location:location.value,
price:price.value,
rooms:rooms.value,
bathrooms:bathrooms.value,
builtup:builtup.value,
furnishing:furnishing.value,
tenure:tenure.value,
description:description.value,
whatsapp:whatsapp.value,
photos:photos,
privateNotes:privateNotes.value,
status:selectedStatus
}
}

function photosInput(){
return document.getElementById("photos").value
}

function add(){
if(editingId){update();return}
items.unshift(getData())
clear()
render()
exportCode()
}

function edit(id){
let x=items.find(i=>i.id===id)
editingId=id

title.value=x.title||""
location.value=x.location||""
price.value=x.price||""
rooms.value=x.rooms||""
bathrooms.value=x.bathrooms||""
builtup.value=x.builtup||""
furnishing.value=x.furnishing||""
tenure.value=x.tenure||""
description.value=x.description||""
whatsapp.value=x.whatsapp||""
document.getElementById("photos").value=(x.photos||[]).join("\n")
privateNotes.value=x.privateNotes||""

selectedStatus=x.status||"Available"
setStatus(selectedStatus,document.querySelector(`.status-${selectedStatus.toLowerCase().replace(" ","-")}`))

mainBtn.innerText="Update Listing"
cancelBtn.style.display="inline-block"
window.scrollTo({top:0})
}

function update(){
items=items.map(x=>x.id===editingId?getData(editingId):x)
cancelEdit()
render()
exportCode()
}

function cancelEdit(){
editingId=null
clear()
mainBtn.innerText="Add Listing"
cancelBtn.style.display="none"
}

function clear(){
document.querySelectorAll("input,textarea").forEach(i=>i.value="")
selectedStatus="Available"
document.querySelector(".status-available").click()
}

function remove(id){
items=items.filter(x=>x.id!==id)
render()
exportCode()
}

function render(){
let html=""
items.forEach(x=>{
let s=x.status||"Available"
html+=`
<div class="item">
<b>${x.title}</b><br>
${x.location} ${x.price}<br>
<span class="status-badge ${getBadge(s)}">${s}</span><br><br>
<button class="edit" onclick="edit(${x.id})">Edit</button>
<button class="delete" onclick="remove(${x.id})">Delete</button>
</div>`
})
list.innerHTML=html
}

function exportCode(){
output.value="const LISTINGS = "+JSON.stringify(items,null,2)+";"
}

function copy(){
output.select()
document.execCommand("copy")
alert("Copied")
}

render()
exportCode()

</script>

</body>
</html>
