<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Listings</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f1eb;
      margin:0;
      color:#222;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:25px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
    }

    h1,h2{
      margin-top:0;
    }

    input, textarea, select{
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
      margin-bottom:10px;
      box-sizing:border-box;
      font-size:14px;
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:5px;
    }

    button{
      padding:10px 18px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:14px;
    }

    .add{background:#2f6fed;color:white;}
    .copy{background:#25D366;color:white;}
    .edit{background:#f0ad4e;color:white;}
    .delete{background:#d9534f;color:white;}
    .secondary{background:#777;color:white;}

    .item{
      border-bottom:1px solid #eee;
      padding:16px 0;
    }

    .item:last-child{
      border-bottom:none;
    }

    .item h3{
      margin:0 0 8px 0;
    }

    .meta{
      color:#666;
      font-size:14px;
      margin-bottom:8px;
      line-height:1.5;
    }

    .preview{
      background:#fafafa;
      border:1px solid #eee;
      border-radius:8px;
      padding:10px;
      white-space:pre-wrap;
      margin-top:10px;
      font-size:14px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .small{
      font-size:13px;
      color:#666;
    }

    @media (max-width: 700px){
      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Admin Listings</h1>
      <div class="small">Add, edit, delete, and copy your property listings.</div>
    </div>

    <div class="card">
      <h2 id="formTitle">Add New Listing</h2>

      <input type="text" id="title" placeholder="Listing title" />
      <input type="text" id="location" placeholder="Location / Address" />

      <div class="row">
        <input type="text" id="price" placeholder="Price / Rental (e.g. RM 450,000 or RM 1,500/month)" />
        <select id="status">
          <option value="Available">Available</option>
          <option value="For Sale">For Sale</option>
          <option value="For Rent">For Rent</option>
          <option value="Sold">Sold</option>
          <option value="Rented">Rented</option>
        </select>
      </div>

      <div class="row">
        <input type="text" id="type" placeholder="Property type (e.g. Condo / Landed / Shoplot)" />
        <input type="text" id="size" placeholder="Size (e.g. 1200 sqft)" />
      </div>

      <textarea id="details" placeholder="Property details"></textarea>
      <textarea id="whatsappText" placeholder="Optional custom WhatsApp text. Leave blank to auto-generate."></textarea>

      <div class="actions">
        <button class="add" id="saveBtn" onclick="saveListing()">Add Listing</button>
        <button class="secondary" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <div class="card">
      <div class="topbar">
        <h2 style="margin:0;">Posted Listings</h2>
        <input
          type="text"
          id="search"
          placeholder="Search listing..."
          style="max-width:300px; margin:0;"
          oninput="render()"
        />
      </div>
      <div id="listings"></div>
    </div>
  </div>

  <script>
    let listings = JSON.parse(localStorage.getItem("listings")) || [];
    let editIndex = -1;

    function saveToStorage(){
      localStorage.setItem("listings", JSON.stringify(listings));
    }

    function getFormData(){
      return {
        title: document.getElementById("title").value.trim(),
        location: document.getElementById("location").value.trim(),
        price: document.getElementById("price").value.trim(),
        status: document.getElementById("status").value,
        type: document.getElementById("type").value.trim(),
        size: document.getElementById("size").value.trim(),
        details: document.getElementById("details").value.trim(),
        whatsappText: document.getElementById("whatsappText").value.trim()
      };
    }

    function autoGenerateText(item){
      return `${item.title}
Location: ${item.location}
Price: ${item.price}
Status: ${item.status}
Type: ${item.type}
Size: ${item.size}

Details:
${item.details}`.trim();
    }

    function saveListing(){
      const item = getFormData();

      if(!item.title || !item.location || !item.price){
        alert("Please fill in at least title, location, and price.");
        return;
      }

      if(editIndex === -1){
        listings.unshift(item);
      } else {
        listings[editIndex] = item;
        editIndex = -1;
      }

      saveToStorage();
      clearForm();
      render();
    }

    function editItem(index){
      const item = listings[index];

      document.getElementById("title").value = item.title || "";
      document.getElementById("location").value = item.location || "";
      document.getElementById("price").value = item.price || "";
      document.getElementById("status").value = item.status || "Available";
      document.getElementById("type").value = item.type || "";
      document.getElementById("size").value = item.size || "";
      document.getElementById("details").value = item.details || "";
      document.getElementById("whatsappText").value = item.whatsappText || "";

      editIndex = index;
      document.getElementById("formTitle").innerText = "Edit Listing";
      document.getElementById("saveBtn").innerText = "Update Listing";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteItem(index){
      if(confirm("Delete this listing?")){
        listings.splice(index, 1);
        saveToStorage();
        render();
      }
    }

    function clearForm(){
      document.getElementById("title").value = "";
      document.getElementById("location").value = "";
      document.getElementById("price").value = "";
      document.getElementById("status").value = "Available";
      document.getElementById("type").value = "";
      document.getElementById("size").value = "";
      document.getElementById("details").value = "";
      document.getElementById("whatsappText").value = "";

      editIndex = -1;
      document.getElementById("formTitle").innerText = "Add New Listing";
      document.getElementById("saveBtn").innerText = "Add Listing";
    }

    function copyItem(index){
      const item = listings[index];
      const text = item.whatsappText && item.whatsappText.trim() !== ""
        ? item.whatsappText
        : autoGenerateText(item);

      navigator.clipboard.writeText(text)
        .then(() => alert("Listing copied."))
        .catch(() => alert("Copy failed."));
    }

    function render(){
      const box = document.getElementById("listings");
      const keyword = document.getElementById("search").value.trim().toLowerCase();

      box.innerHTML = "";

      const filtered = listings
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => {
          const combined = `
            ${item.title}
            ${item.location}
            ${item.price}
            ${item.status}
            ${item.type}
            ${item.size}
            ${item.details}
            ${item.whatsappText}
          `.toLowerCase();

          return combined.includes(keyword);
        });

      if(filtered.length === 0){
        box.innerHTML = "<p>No listings found.</p>";
        return;
      }

      filtered.forEach(({ item, index }) => {
        const previewText = item.whatsappText && item.whatsappText.trim() !== ""
          ? item.whatsappText
          : autoGenerateText(item);

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <h3>${escapeHtml(item.title)}</h3>
          <div class="meta">
            <strong>Location:</strong> ${escapeHtml(item.location)}<br>
            <strong>Price:</strong> ${escapeHtml(item.price)}<br>
            <strong>Status:</strong> ${escapeHtml(item.status)}<br>
            <strong>Type:</strong> ${escapeHtml(item.type || "-")}<br>
            <strong>Size:</strong> ${escapeHtml(item.size || "-")}
          </div>
          <div>${escapeHtml(item.details || "")}</div>
          <div class="preview">${escapeHtml(previewText)}</div>
          <div class="actions">
            <button class="copy" onclick="copyItem(${index})">Copy</button>
            <button class="edit" onclick="editItem(${index})">Edit</button>
            <button class="delete" onclick="deleteItem(${index})">Delete</button>
          </div>
        `;
        box.appendChild(div);
      });
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    render();
  </script>
</body>
</html>
