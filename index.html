<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenneth Property Listings</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f1eb;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

h1{
margin-bottom:20px;
}

.search{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:25px;
}

.card{
background:white;
border-radius:14px;
margin-bottom:25px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.slider{
position:relative;
height:320px;
}

.slider img{
width:100%;
height:100%;
object-fit:cover;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.left{left:10px;}
.right{right:10px;}

.body{
padding:20px;
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.price{
font-size:28px;
font-weight:bold;
margin:10px 0;
}

.meta{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.whatsapp{
background:#25D366;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
margin-top:15px;
cursor:pointer;
}

@media(max-width:700px){

.meta{
grid-template-columns:1fr;
}

.slider{
height:220px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Property Listings</h1>

<input
class="search"
id="search"
placeholder="Search location, project, keyword..."
oninput="render()"
/>

<div id="listings"></div>

</div>

<script src="listings.js"></script>

<script>

let data = LISTINGS.map(x=>({...x,index:0}))

function slide(id,dir){

let item=data.find(x=>x.id===id)

item.index+=dir

if(item.index<0) item.index=item.photos.length-1
if(item.index>=item.photos.length) item.index=0

render()

}

function render(){

let key=document.getElementById("search").value.toLowerCase()

let filtered=data.filter(x=>{

return (
(x.title||"").toLowerCase().includes(key)||
(x.location||"").toLowerCase().includes(key)||
(x.description||"").toLowerCase().includes(key)
)

})

let html=""

filtered.forEach(x=>{

let img=x.photos?.length?x.photos[x.index]:""

html+=`
<div class="card">

<div class="slider">

<img src="${img}">

${x.photos.length>1?`
<button class="arrow left" onclick="slide(${x.id},-1)">‹</button>
<button class="arrow right" onclick="slide(${x.id},1)">›</button>
`:``}

</div>

<div class="body">

<div class="title">${x.title||"Listing"}</div>

<div class="meta">
<div><b>Location:</b> ${x.location||"-"}</div>
<div><b>Built-up:</b> ${x.builtup||"-"}</div>
<div><b>Rooms:</b> ${x.rooms||"-"}</div>
<div><b>Bathrooms:</b> ${x.bathrooms||"-"}</div>
<div><b>Furnishing:</b> ${x.furnishing||"-"}</div>
<div><b>Tenure:</b> ${x.tenure||"-"}</div>
</div>

${x.price?`<div class="price">${x.price}</div>`:""}

<p>${x.description||""}</p>

${x.whatsapp?`
<button class="whatsapp"
onclick="window.open('https://wa.me/${x.whatsapp}')">
WhatsApp
</button>
`:""}

</div>

</div>
`

})

document.getElementById("listings").innerHTML=html

}

render()

</script>

</body>
</html>
