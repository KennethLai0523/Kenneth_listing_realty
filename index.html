<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kenneth Property Listings</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:30px;
}

h2{
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.filter{
background:#b88a3b;
color:white;
margin-right:10px;
}

.sample{
background:#ddd;
}

.container{
max-width:1000px;
margin:auto;
}

.listing-card{
background:white;
border-radius:14px;
overflow:hidden;
margin-top:25px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.image-slider{
position:relative;
height:260px;
overflow:hidden;
}

.image-slider img{
width:100%;
height:100%;
object-fit:cover;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.arrow-left{
left:10px;
}

.arrow-right{
right:10px;
}

.card-body{
padding:20px;
}

.tag{
background:#f3e7cf;
padding:6px 12px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.whatsapp{
background:#25D366;
color:white;
width:48%;
}

.delete{
background:#e6e1d8;
width:48%;
}

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>Browse Listings</h2>

<button class="filter">All</button>
<button class="filter">Buyer / Tenant View</button>
<button class="filter">Co-Broke Agent View</button>
<button class="sample">Load Sample Listings</button>


<!-- LISTING 1 -->
<div class="listing-card">

<div class="image-slider">

<button class="arrow arrow-left" onclick="changeSlide(this,-1)">‹</button>

<img class="slider-image"
src="images/ava1.jpg"
data-images='["images/ava1.jpg","images/ava2.jpg","images/ava3.jpg"]'
data-index="0">

<button class="arrow arrow-right" onclick="changeSlide(this,1)">›</button>

</div>

<div class="card-body">

<div class="tag">For Sale · Buyer / Tenant</div>

<h3>Residensi Ava</h3>

<p>Location: Kepong</p>
<p>Rooms: 3 Bed · 3 Bath</p>

<div class="price">RM590,000</div>

<p>Near MRT</p>

<div class="actions">

<button class="whatsapp"
onclick="window.open('https://wa.me/60166287357')">
WhatsApp
</button>

<button class="delete"
onclick="this.closest('.listing-card').remove()">
Delete
</button>

</div>

</div>
</div>


<!-- LISTING 2 -->
<div class="listing-card">

<div class="image-slider">

<button class="arrow arrow-left" onclick="changeSlide(this,-1)">‹</button>

<img class="slider-image"
src="images/mluna1.jpg"
data-images='["images/mluna1.jpg","images/mluna2.jpg","images/mluna3.jpg"]'
data-index="0">

<button class="arrow arrow-right" onclick="changeSlide(this,1)">›</button>

</div>

<div class="card-body">

<div class="tag">For Sale · Buyer / Tenant</div>

<h3>M Luna</h3>

<p>Location: Kepong</p>
<p>Rooms: 4 Bed · 2 Bath</p>

<div class="price">RM950,000</div>

<p>Corner Unit · Spacious</p>

<div class="actions">

<button class="whatsapp"
onclick="window.open('https://wa.me/60166287357')">
WhatsApp
</button>

<button class="delete"
onclick="this.closest('.listing-card').remove()">
Delete
</button>

</div>

</div>
</div>


</div>

<script>

function changeSlide(button, direction){

const slider = button.parentElement
const img = slider.querySelector(".slider-image")

const images = JSON.parse(img.dataset.images)

let index = parseInt(img.dataset.index)

index += direction

if(index < 0){
index = images.length-1
}

if(index >= images.length){
index = 0
}

img.src = images[index]
img.dataset.index = index

}

</script>

</body>
</html>
